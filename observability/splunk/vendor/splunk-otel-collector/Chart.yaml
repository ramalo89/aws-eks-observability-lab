apiVersion: v2
appVersion: 0.156.0
dependencies:
- alias: certmanager
  condition: certmanager.enabled
  name: cert-manager
  repository: https://charts.jetstack.io
  version: v1.19.5
- alias: operatorcrds
  condition: operatorcrds.install
  name: opentelemetry-operator-crds
  repository: ""
  version: 0.0.7
- alias: operator
  condition: operator.enabled
  name: opentelemetry-operator
  repository: https://open-telemetry.github.io/opentelemetry-helm-charts
  version: 0.117.0
- alias: obi
  condition: obi.enabled
  name: opentelemetry-ebpf-instrumentation
  repository: https://open-telemetry.github.io/opentelemetry-helm-charts
  version: 0.10.0
- alias: targetallocator
  condition: targetallocator.enabled
  name: opentelemetry-target-allocator
  repository: https://open-telemetry.github.io/opentelemetry-helm-charts
  version: 0.130.0
description: Splunk OpenTelemetry Collector for Kubernetes
icon: https://github.com/signalfx/splunk-otel-collector-chart/tree/main/splunk.png
keywords:
- splunk
- opentelemetry
- observability
- logs
- traces
- metrics
- apm
- instrumentation
maintainers:
- name: dmitryax
- name: atoulme
- name: jinja2
- name: dloucasfx
name: splunk-otel-collector
type: application
version: 0.156.0
